<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILO OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <taskbar>
        <taskarea>
            <p id="startBtn">KILO OS</p>
            </taskarea>
        <systemtray>
            <sound>🔊 100%</sound>
            <time id="clock">00:00 AM</time>
        </systemtray>    
    </taskbar>

    <startmenu id="startMenu">
        <h3>Applications</h3>
        <icon class="browser-icon">Browser</icon>
        <icon class="terminal-icon">Terminal</icon>
    </startmenu>

    <desktoparea id="desktop">
        <icon class="terminal-icon" id="coreAppIcon">KiloCore</icon>
        <icon class="trash-icon">Trash</icon>
        
        <div class="window" id="appWindow">
            <div class="window-header">
                <span class="window-title">KiloCore System Panel</span>
                <button class="close-btn" id="closeWindowBtn"></button>
            </div>
            <div class="window-body">
                <p class="cli-line">> KILO OS Kernel Initialized...</p>
                <p class="cli-line">> Status: System fully functional and ready for deployment.</p>
            </div>
        </div>
        <template id="window-template">
            <div class="window">
                <div class="window-header">
                    <span class="window-title">App Name</span>
                    <button class="close-btn"></button>
                </div>
                <div class="window-body">
                </div>
            </div>
        </template>
    </desktoparea>

    <script src="script.js"></script>
</body>
</html>
